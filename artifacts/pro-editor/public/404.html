<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ProEditor</title>
  <script>
    var l = window.location;
    var base = '/Editor';
    var path = l.pathname.replace(base, '') || '/';
    var redirect = base + '/?p=' + encodeURIComponent(path + l.search) + l.hash;
    l.replace(redirect);
  </script>
</head>
<body></body>
</html>
